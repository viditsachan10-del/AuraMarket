name: CI/CD AuraMarket

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}


      - name: Build NFT contract
        run: |
          cd contracts/nft
          cargo build --target wasm32-unknown-unknown --release
          cp ../../target/wasm32-unknown-unknown/release/auramarket_nft.wasm ../marketplace/nft.wasm

      - name: Build Marketplace contract
        run: |
          cd contracts/marketplace
          cargo build --target wasm32-unknown-unknown --release

      - name: Run contract tests
        run: |
          cd contracts/nft && cargo test
          cd ../marketplace && cargo test

  build-frontend:
    runs-on: ubuntu-latest
    needs: build-contracts
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_NFT_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_NFT_CONTRACT_ID }}
          NEXT_PUBLIC_MARKETPLACE_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_MARKETPLACE_CONTRACT_ID }}
          NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          NEXT_PUBLIC_SOROBAN_RPC_URL: "https://soroban-testnet.stellar.org"
